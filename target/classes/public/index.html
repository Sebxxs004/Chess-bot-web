<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Tutor - Tablero Vivo</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <style>
        :root {
            --bg: #f3efe5;
            --panel: #ffffff;
            --ink: #1e2227;
            --accent: #1d6f5e;
            --border: #d7cfba;
            --muted: #5b636d;
            --good: #1f7a55;
            --bad: #8a2e2e;
        }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 18% 14%, #fff5d9 0%, var(--bg) 52%, #e8e3d5 100%);
            color: var(--ink);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .panel {
            width: min(980px, 100%);
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 14px 38px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.5rem;
        }

        .subtitle {
            margin: 0 0 14px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 420px minmax(260px, 1fr);
            gap: 16px;
        }

        .board-wrap {
            display: grid;
            gap: 10px;
        }

        .board-row {
            display: flex;
            align-items: stretch;
            gap: 10px;
        }

        #eval-bar {
            width: 30px;
            height: 400px;
            background: #f0ede2;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        #eval-fill {
            width: 100%;
            height: 50%;
            background: #2a2d32;
            position: absolute;
            bottom: 0;
            transition: height 0.5s ease;
        }

        #board {
            width: 400px;
            max-width: 100%;
            border: 2px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .meta {
            display: grid;
            gap: 8px;
        }

        .pill {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            background: #fbfaf7;
            font-size: 0.95rem;
        }

        #eval {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--good);
        }

        #thinking-indicator {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
            display: none;
            align-items: center;
            gap: 8px;
        }

        #thinking-indicator.visible {
            display: inline-flex;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #d8d3c7;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        #pv-text {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            background: #faf8f2;
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.92rem;
            min-height: 22px;
            color: #2a2d32;
            word-break: break-word;
        }

        #log {
            min-height: 90px;
            max-height: 180px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            background: #fcfbf7;
            font-family: Consolas, "Courier New", monospace;
            white-space: pre-wrap;
            line-height: 1.3;
        }

        .status {
            margin: 0;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .history-wrap {
            display: grid;
            gap: 10px;
            grid-template-rows: auto 1fr auto;
        }

        .history-header {
            margin: 0;
            font-size: 1.05rem;
        }

        #move-history {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fcfbf7;
            padding: 10px;
            overflow-y: auto;
            min-height: 240px;
            max-height: 420px;
            font-family: Consolas, "Courier New", monospace;
            line-height: 1.7;
        }

        .history-row {
            display: grid;
            grid-template-columns: 42px 1fr 1fr;
            gap: 8px;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .move-num {
            color: var(--muted);
        }

        .move-san {
            display: inline-block;
            border-radius: 6px;
            padding: 1px 5px;
        }

        .move-san.current {
            background: #e2f0eb;
            color: #0f4b3f;
            font-weight: 700;
        }

        .nav-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--ink);
            border-radius: 8px;
            min-width: 44px;
            height: 34px;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            #board {
                width: 100%;
            }

             #eval-bar {
                height: 320px;
            }
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>Chess Tutor - Fase 4.2</h1>
    <p class="subtitle">Mueve una pieza blanca. El bot (negras) respondera y el score se actualiza durante la busqueda.</p>

    <div class="layout">
        <div class="board-wrap">
            <div class="board-row">
                <div id="eval-bar" aria-label="Barra de ventaja">
                    <div id="eval-fill"></div>
                </div>
                <div id="board"></div>
            </div>
            <div class="meta">
                <div class="pill status" id="status">Conectando WebSocket...</div>
                <div class="pill">Evaluacion actual: <span id="eval">--</span></div>
                <div class="pill">
                    <span id="thinking-indicator"><span class="spinner"></span>Calculando...</span>
                </div>
                <div class="pill">
                    PV: <div id="pv-text">--</div>
                </div>
            </div>
        </div>
        <div class="history-wrap">
            <h2 class="history-header">Historial de Jugadas</h2>
            <div id="move-history">Sin jugadas todavia.</div>
            <div class="nav-controls">
                <button id="btn-start" class="nav-btn" title="Inicio">&lt;&lt;</button>
                <button id="btn-prev" class="nav-btn" title="Anterior">&lt;</button>
                <button id="btn-next" class="nav-btn" title="Siguiente">&gt;</button>
                <button id="btn-latest" class="nav-btn" title="Actual">&gt;&gt;</button>
            </div>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const statusEl = document.getElementById("status");
    const evalEl = document.getElementById("eval");
    const evalFillEl = document.getElementById("eval-fill");
    const thinkingEl = document.getElementById("thinking-indicator");
    const pvTextEl = document.getElementById("pv-text");
    const moveHistoryEl = document.getElementById("move-history");
    const btnStart = document.getElementById("btn-start");
    const btnPrev = document.getElementById("btn-prev");
    const btnNext = document.getElementById("btn-next");
    const btnLatest = document.getElementById("btn-latest");
    const logEl = document.getElementById("log");
    let game;
    let board;
    let isEngineThinking = false;
    let timeline = [];
    let currentPly = 0;
    let currentPgn = "";

    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const socket = new WebSocket(`${protocol}://${window.location.host}/chess`);
    const PIECE_ICON_MAP = {
        wP: "https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg",
        wR: "https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg",
        wN: "https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg",
        wB: "https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg",
        wQ: "https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg",
        wK: "https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg",
        bP: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg",
        bR: "https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg",
        bN: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg",
        bB: "https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg",
        bQ: "https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg",
        bK: "https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg"
    };

    function writeLine(text) {
        logEl.textContent += text + "\n";
        logEl.scrollTop = logEl.scrollHeight;
    }

    function sendCommand(command) {
        if (socket.readyState !== WebSocket.OPEN) {
            writeLine("[WARN] Socket no esta listo");
            return;
        }
        writeLine(`> ${command}`);
        socket.send(command);
    }

    function updateBoard() {
        board.position(game.fen(), true);
    }

    function toUci(move) {
        return `${move.from}${move.to}${move.promotion || ""}`;
    }

    function getFenAtPly(ply) {
        if (ply <= 0) {
            return "start";
        }
        return timeline[ply - 1].fen;
    }

    function syncGameToCurrentPly() {
        const fen = getFenAtPly(currentPly);
        if (fen === "start") {
            game.reset();
            return;
        }
        game.load(fen);
    }

    function updateNavigationButtons() {
        const hasMoves = timeline.length > 0;
        btnStart.disabled = !hasMoves || currentPly === 0;
        btnPrev.disabled = !hasMoves || currentPly === 0;
        btnNext.disabled = !hasMoves || currentPly >= timeline.length;
        btnLatest.disabled = !hasMoves || currentPly >= timeline.length;
    }

    function updateHistoryPanel() {
        if (timeline.length === 0 || !currentPgn) {
            moveHistoryEl.textContent = "Sin jugadas todavia.";
            updateNavigationButtons();
            return;
        }

        const rows = [];
        const currentMoveNumber = currentPly > 0 ? Math.ceil(currentPly / 2) : -1;
        const currentIsWhite = currentPly % 2 === 1;
        const regex = /(\d+)\.\s*([^\s]+)(?:\s+([^\s]+))?/g;
        let match;
        while ((match = regex.exec(currentPgn)) !== null) {
            const moveNumber = Number(match[1]);
            const white = match[2] || "";
            const black = match[3] || "";
            const whiteCurrent = currentPly > 0 && moveNumber === currentMoveNumber && currentIsWhite ? "current" : "";
            const blackCurrent = currentPly > 0 && moveNumber === currentMoveNumber && !currentIsWhite ? "current" : "";
            rows.push(
                `<div class="history-row">` +
                `<span class="move-num">${moveNumber}.</span>` +
                `<span class="move-san ${whiteCurrent}">${white}</span>` +
                `<span class="move-san ${blackCurrent}">${black}</span>` +
                `</div>`
            );
        }
        moveHistoryEl.innerHTML = rows.join("");

        const currentEl = moveHistoryEl.querySelector(".move-san.current");
        if (currentEl) {
            currentEl.scrollIntoView({ block: "nearest" });
        }

        updateNavigationButtons();
    }

    function registerMove(move) {
        if (currentPly < timeline.length) {
            timeline = timeline.slice(0, currentPly);
        }
        timeline.push({
            san: move.san,
            uci: toUci(move),
            fen: game.fen()
        });
        currentPly = timeline.length;
        currentPgn = game.pgn();
        updateHistoryPanel();
    }

    function stopEngineSearch() {
        if (isEngineThinking) {
            sendCommand("stop");
        }
        setEngineThinking(false);
    }

    function navigateToPly(targetPly) {
        const clamped = clamp(targetPly, 0, timeline.length);
        stopEngineSearch();
        currentPly = clamped;
        syncGameToCurrentPly();
        updateBoard();
        updateHistoryPanel();
        pvTextEl.textContent = "--";
    }

    function setEngineThinking(value) {
        isEngineThinking = value;
        thinkingEl.classList.toggle("visible", value);
    }

    function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    function setEvalBarPercent(percent) {
        const clamped = clamp(percent, 0, 100);
        evalFillEl.style.height = `${clamped}%`;
    }

    function updateEvalFromCp(cp) {
        const pawns = (cp / 100).toFixed(2);
        evalEl.textContent = `${pawns} peones`;
        evalEl.style.color = cp >= 0 ? "var(--good)" : "var(--bad)";
        const heightPercent = 50 - (cp / 20);
        setEvalBarPercent(heightPercent);
    }

    function updateEvalFromMate(mate) {
        evalEl.textContent = `Mate en ${Math.abs(mate)} (${mate > 0 ? "+" : "-"})`;
        evalEl.style.color = mate > 0 ? "var(--good)" : "var(--bad)";
        setEvalBarPercent(mate > 0 ? 0 : 100);
    }

    function onDragStart(source, piece) {
        if (game.game_over()) {
            return false;
        }
        if (isEngineThinking) {
            return false;
        }
        if (game.turn() !== "w") {
            return false;
        }
        if (piece.startsWith("b")) {
            return false;
        }
        return true;
    }

    function onDrop(source, target) {
        const move = game.move({ from: source, to: target, promotion: "q" });
        if (move === null) {
            return "snapback";
        }

        registerMove(move);
        updateBoard();
        setEngineThinking(true);
        evalEl.textContent = "Pensando...";
        evalEl.style.color = "var(--muted)";
        pvTextEl.textContent = "Calculando linea principal...";

        sendCommand(`position fen ${game.fen()} moves`);
        sendCommand("go movetime 1000");
        return undefined;
    }

    function applyBestMove(bestMoveToken) {
        if (!bestMoveToken || bestMoveToken === "0000" || bestMoveToken === "(none)") {
            setEngineThinking(false);
            return;
        }
        const from = bestMoveToken.substring(0, 2);
        const to = bestMoveToken.substring(2, 4);
        const promotion = bestMoveToken.length > 4 ? bestMoveToken.substring(4, 5) : "q";
        const result = game.move({ from, to, promotion });
        if (result !== null) {
            registerMove(result);
            updateBoard();
        }
        setEngineThinking(false);
    }

    function renderScoreFromInfo(message) {
        const cpMatch = message.match(/score\s+cp\s+(-?\d+)/);
        if (cpMatch) {
            const cp = Number(cpMatch[1]);
            updateEvalFromCp(cp);
            return;
        }

        const mateMatch = message.match(/score\s+mate\s+(-?\d+)/);
        if (mateMatch) {
            const mate = Number(mateMatch[1]);
            updateEvalFromMate(mate);
        }
    }

    function renderPvFromInfo(message) {
        const pvIndex = message.indexOf(" pv ");
        if (pvIndex < 0) {
            return;
        }
        const pv = message.substring(pvIndex + 4).trim();
        pvTextEl.textContent = pv || "--";
    }

    function initBoard() {
        if (typeof Chessboard !== "function") {
            statusEl.textContent = "Error: Chessboard.js no cargado";
            writeLine("[ERROR] Chessboard.js no esta disponible");
            return;
        }
        if (typeof Chess !== "function") {
            statusEl.textContent = "Error: chess.js no cargado";
            writeLine("[ERROR] chess.js no esta disponible");
            return;
        }

        game = new Chess();

        board = Chessboard("board", {
            draggable: true,
            position: "start",
            pieceTheme: piece => PIECE_ICON_MAP[piece],
            onDragStart,
            onDrop
        });
    }

    socket.addEventListener("open", () => {
        statusEl.textContent = "Conectado a ws://localhost:7070/chess";
        writeLine("[Sistema] Socket abierto");
        sendCommand("uci");
    });

    socket.addEventListener("message", event => {
        const message = String(event.data || "").trim();
        writeLine(`< ${message}`);

        if (message.startsWith("info depth")) {
            if (!isEngineThinking) {
                return;
            }
            renderScoreFromInfo(message);
            renderPvFromInfo(message);
            return;
        }

        if (message.startsWith("bestmove")) {
            if (!isEngineThinking) {
                return;
            }
            const tokens = message.split(/\s+/);
            applyBestMove(tokens.length > 1 ? tokens[1] : "");
        }
    });

    socket.addEventListener("close", () => {
        statusEl.textContent = "Socket cerrado";
        setEngineThinking(false);
        writeLine("[Sistema] Socket cerrado");
    });

    socket.addEventListener("error", () => {
        statusEl.textContent = "Error de conexión";
        setEngineThinking(false);
        writeLine("[Sistema] Error de WebSocket");
    });

    btnStart.addEventListener("click", () => navigateToPly(0));
    btnPrev.addEventListener("click", () => navigateToPly(currentPly - 1));
    btnNext.addEventListener("click", () => navigateToPly(currentPly + 1));
    btnLatest.addEventListener("click", () => navigateToPly(timeline.length));

    window.addEventListener("DOMContentLoaded", () => {
        initBoard();
        setEvalBarPercent(50);
        updateHistoryPanel();
    });
</script>
</body>
</html>
